<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiet Light</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #rays-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }

    /* lang btn */
    .lang-btn {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      border: none; border-radius: 50%; width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 4px 16px rgba(0,0,0,0.3);
      transition: background 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .lang-btn:hover { background: rgba(255,255,255,0.18); transform: rotate(20deg) scale(1.08); }
    .lang-btn svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 1.5; }

    .lang-dropdown {
      position: fixed; top: 74px; right: 20px; z-index: 100;
      border-radius: 18px; overflow: hidden; flex-direction: column; min-width: 168px;
      transform-origin: top right;
      transform: scale(0.8) translateY(-10px); opacity: 0; pointer-events: none;
      display: flex;
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
      background: rgba(20,20,22,0.85);
      backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lang-dropdown.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
    .lang-option {
      padding: 13px 20px; cursor: pointer; font-size: 15px; font-weight: 500;
      color: #fff; display: flex; align-items: center; gap: 10px;
      border: none; background: none; text-align: left; width: 100%;
      transition: background 0.18s;
    }
    .lang-option:hover { background: rgba(255,255,255,0.09); }
    .lang-option.active { font-weight: 700; }
    .lang-option .flag { font-size: 18px; }

    /* hero */
    #page-hero {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      padding: 40px 28px 80px; gap: 16px;
    }
    .hero-title {
      font-size: clamp(52px, 15vw, 76px); font-weight: 800;
      letter-spacing: -0.02em; line-height: 1;
      opacity: 0; transform: translateY(28px);
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .hero-sub {
      font-size: clamp(17px, 5vw, 22px); font-weight: 700; color: #fff;
      line-height: 1.4; opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* liquid glass buttons */
    .btn-join {
      width: 100%; max-width: 320px; padding: 18px 0;
      font-size: 18px; font-weight: 700; border: none; border-radius: 20px;
      cursor: pointer; text-decoration: none; display: block; text-align: center;
      margin-top: 10px; opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative; overflow: hidden; color: #000;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 2px 0 rgba(255,255,255,0.9) inset, 0 -1px 0 rgba(0,0,0,0.08) inset,
                  0 8px 32px rgba(255,255,255,0.12), 0 1px 2px rgba(0,0,0,0.3);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease;
    }
    .btn-join::before {
      content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-20deg); transition: left 0.6s ease; pointer-events: none;
    }
    .btn-join:hover::before { left: 130%; }
    .btn-join:hover { transform: scale(1.03) translateY(-1px); box-shadow: 0 2px 0 rgba(255,255,255,0.95) inset, 0 16px 48px rgba(255,255,255,0.22); }
    .btn-join:active { transform: scale(0.97) translateY(1px); transition: transform 0.1s; }

    .btn-about {
      width: 100%; max-width: 320px; padding: 17px 0;
      font-size: 18px; font-weight: 700; border-radius: 20px;
      cursor: pointer; text-align: center; opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.52s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative; overflow: hidden; color: #fff;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 -1px 0 rgba(0,0,0,0.15) inset;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.25s ease, border-color 0.25s ease;
    }
    .btn-about::before {
      content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
      transform: skewX(-20deg); transition: left 0.6s ease; pointer-events: none;
    }
    .btn-about:hover::before { left: 130%; }
    .btn-about:hover { transform: scale(1.03) translateY(-1px); background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.4); }
    .btn-about:active { transform: scale(0.97) translateY(1px); transition: transform 0.1s; }

    .scroll-hint {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      opacity: 0; animation: fadeIn 1s 1.2s ease forwards;
    }
    .scroll-hint span { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.4; }
    .scroll-hint svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.4); fill: none; stroke-width: 2; animation: arrowBounce 2s 1.8s ease infinite; }
    @keyframes arrowBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }

    /* about */
    #page-about { position: relative; z-index: 1; padding: 60px 24px 100px; }
    .about-card {
      border-radius: 26px; padding: 40px 28px; max-width: 520px; margin: 0 auto;
      background: rgba(18,18,20,0.65);
      backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 32px 80px rgba(0,0,0,0.5);
      opacity: 0; transform: translateY(50px) scale(0.98);
      transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1);
    }
    .about-card.visible { opacity: 1; transform: translateY(0) scale(1); }
    .about-title { font-size: clamp(32px, 9vw, 46px); font-weight: 800; margin-bottom: 24px; text-align: center; }
    .about-text { font-size: clamp(15px, 4.2vw, 18px); font-weight: 700; line-height: 1.65; text-align: center; color: #fff; }
    .about-text + .about-text { margin-top: 18px; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<canvas id="rays-canvas"></canvas>

<button class="lang-btn" id="langBtn" onclick="toggleLang()">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
</button>

<div class="lang-dropdown" id="langDropdown">
  <button class="lang-option active" onclick="setLang('ru')"><span class="flag">🇷🇺</span> Русский</button>
  <button class="lang-option" onclick="setLang('en')"><span class="flag">🇬🇧</span> English</button>
  <button class="lang-option" onclick="setLang('es')"><span class="flag">🇪🇸</span> Español</button>
  <button class="lang-option" onclick="setLang('de')"><span class="flag">🇩🇪</span> Deutsch</button>
  <button class="lang-option" onclick="setLang('fr')"><span class="flag">🇫🇷</span> Français</button>
  <button class="lang-option" onclick="setLang('zh')"><span class="flag">🇨🇳</span> 中文</button>
</div>

<section id="page-hero">
  <h1 class="hero-title">Quiet Light</h1>
  <p class="hero-sub" id="txt-sub">Уют. Улица. Природа. Макро.</p>
  <a href="https://t.me/The_quietlight" target="_blank" class="btn-join" id="txt-join">Присоединиться</a>

<section id="page-about">

    <p class="about-text" id="txt-about-p1"></p>
    <p class="about-text" id="txt-about-p2"></p>
    <p class="about-text" id="txt-about-p3"></p>
  </div>
</section>

<script>
/* ════════════════════════════════════
   STRONG SOFT GLOW RAYS — visible blobs rising from bottom
════════════════════════════════════ */
const canvas = document.getElementById('rays-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Offscreen canvas for heavy blur (avoids main canvas filter lag on mobile)
const offscreen = document.createElement('canvas');
const off = offscreen.getContext('2d');

function makeBlob() {
  const tier = Math.random();
  let radiusX, radiusY, baseAlpha, speed, blurR;

  if (tier < 0.3) {
    // Thin tall pillar
    radiusX = 18 + Math.random() * 28;
    radiusY = H * (0.18 + Math.random() * 0.18);
    baseAlpha = 0.55 + Math.random() * 0.35;
    speed     = 0.5 + Math.random() * 0.8;
    blurR     = 18 + Math.random() * 22;
  } else if (tier < 0.65) {
    // Medium wide column
    radiusX = 55 + Math.random() * 75;
    radiusY = H * (0.22 + Math.random() * 0.22);
    baseAlpha = 0.35 + Math.random() * 0.3;
    speed     = 0.25 + Math.random() * 0.45;
    blurR     = 35 + Math.random() * 40;
  } else {
    // Large wide bloom
    radiusX = 130 + Math.random() * 160;
    radiusY = H * (0.28 + Math.random() * 0.28);
    baseAlpha = 0.18 + Math.random() * 0.18;
    speed     = 0.12 + Math.random() * 0.22;
    blurR     = 60 + Math.random() * 70;
  }

  return {
    x: W * (0.08 + Math.random() * 0.84),
    y: H + radiusY,
    radiusX, radiusY, baseAlpha, speed, blurR,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.004 + Math.random() * 0.008,
    swayAmp:   20 + Math.random() * 55,
    life: 0,
    maxLife:  300 + Math.random() * 500,
    fadeIn:   90  + Math.random() * 80,
    fadeOut:  90  + Math.random() * 100,
  };
}

let blobs = Array.from({ length: 20 }, () => {
  const b = makeBlob();
  b.life = Math.random() * b.maxLife;
  const prog = b.life / b.maxLife;
  b.y = H + b.radiusY - prog * (H + b.radiusY * 2.5);
  return b;
});

let ambT = 0;

function drawFrame() {
  ctx.clearRect(0, 0, W, H);

  // Ambient base glow from bottom — strong
  ambT += 0.005;
  const pulse = 0.5 + Math.sin(ambT) * 0.5;

  const ag = ctx.createRadialGradient(W/2, H, 0, W/2, H * 0.45, H * 1.15);
  ag.addColorStop(0,   `rgba(110,110,130,${0.28 + pulse * 0.1})`);
  ag.addColorStop(0.4, `rgba(60,60,75,${0.14 + pulse * 0.05})`);
  ag.addColorStop(0.75,`rgba(20,20,28,${0.07})`);
  ag.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = ag;
  ctx.fillRect(0, 0, W, H);

  blobs.forEach((b, i) => {
    b.life += 1;
    b.y    -= b.speed;
    b.sway += b.swaySpeed;
    const sx = b.x + Math.sin(b.sway) * b.swayAmp;

    let lf = 1;
    if (b.life < b.fadeIn)                   lf = easeInOut(b.life / b.fadeIn);
    else if (b.life > b.maxLife - b.fadeOut) lf = easeInOut((b.maxLife - b.life) / b.fadeOut);
    if (b.life >= b.maxLife) { blobs[i] = makeBlob(); return; }

    const alpha = b.baseAlpha * lf;

    // Draw on offscreen with ellipse + radial gradient, then blur-composite onto main
    const pad  = b.blurR * 2.5;
    const ow   = (b.radiusX + pad) * 2;
    const oh   = (b.radiusY + pad) * 2;
    offscreen.width  = ow;
    offscreen.height = oh;
    off.clearRect(0, 0, ow, oh);

    const cx = ow / 2, cy = oh / 2;

    const grd = off.createRadialGradient(cx, cy, 0, cx, cy, Math.max(b.radiusX, b.radiusY));
    grd.addColorStop(0,    `rgba(255,255,255,${alpha})`);
    grd.addColorStop(0.25, `rgba(220,225,255,${alpha * 0.7})`);
    grd.addColorStop(0.55, `rgba(180,185,230,${alpha * 0.35})`);
    grd.addColorStop(0.85, `rgba(140,140,200,${alpha * 0.1})`);
    grd.addColorStop(1,    'rgba(0,0,0,0)');

    off.save();
    off.filter = `blur(${b.blurR}px)`;
    off.scale(1, b.radiusY / b.radiusX);
    off.beginPath();
    off.arc(cx, cy * (b.radiusX / b.radiusY), b.radiusX, 0, Math.PI * 2);
    off.fillStyle = grd;
    off.fill();
    off.restore();

    ctx.drawImage(offscreen, sx - ow/2, b.y - oh/2);
  });

  requestAnimationFrame(drawFrame);
}
drawFrame();

/* ════════ TRANSLATIONS ════════ */
const T = {
  ru: {
    sub:'Уют. Улица. Природа. Макро.', join:'Присоединиться', about:'О канале', scroll:'листай вниз',
    aboutTitle:'О канале',
    p1:'Quiet Light — это пространство для тех, кто умеет замедляться. Здесь публикуются фотографии, которые хочется рассматривать долго: кадры уютных уголков, тихих улиц, рассветного света сквозь листья, капель на стекле и деталей, которые обычно остаются незамеченными.',
    p2:'Стрит-фотография здесь — не про толпу и суету, а про моменты между. Про человека у окна, тень на асфальте, старую вывеску в переулке. Природа — через крупный план: текстуры коры, прожилки лепестков, иней на траве. Макро превращает обычное в удивительное.',
    p3:'Канал ведётся без алгоритмов и гонки за охватами. Только то, что действительно цепляет взгляд. Подписывайся — и начни замечать красоту там, где раньше просто проходил мимо.',
  },
  en: {
    sub:'Cozy. Street. Nature. Macro.', join:'Join us', about:'About', scroll:'scroll down',
    aboutTitle:'About the Channel',
    p1:"Quiet Light is a space for those who know how to slow down. Here you'll find photographs worth lingering over: cozy corners, quiet streets, morning light through leaves, drops on glass, and details the world usually walks past.",
    p2:"Street photography here isn't about crowds — it's about the moments in between. A person by a window, a shadow on pavement, an old sign in an alley. Nature through close-up: bark textures, petal veins, frost on grass. Macro turns the ordinary into something astonishing.",
    p3:'This channel runs without algorithms or chasing reach. Only what genuinely catches the eye. Subscribe — and start noticing beauty in places you used to walk right past.',
  },
  es: {
    sub:'Acogedor. Calle. Naturaleza. Macro.', join:'Únete', about:'Sobre el canal', scroll:'desliza abajo',
    aboutTitle:'Sobre el canal',
    p1:'Quiet Light es un espacio para quienes saben desacelerar. Aquí encontrarás fotografías que invitan a detenerse: rincones acogedores, calles tranquilas, luz matutina entre hojas, gotas en el cristal y detalles que el mundo normalmente ignora.',
    p2:'La fotografía callejera aquí no trata de multitudes, sino de los momentos entre medias. Una persona junto a la ventana, una sombra en el asfalto, un letrero antiguo en un callejón. La naturaleza a través del primer plano: texturas de corteza, venas de pétalos, escarcha en la hierba.',
    p3:'Este canal funciona sin algoritmos ni carreras por el alcance. Solo lo que de verdad llama la atención. Suscríbete y empieza a notar la belleza donde antes simplemente pasabas de largo.',
  },
  de: {
    sub:'Gemütlich. Straße. Natur. Makro.', join:'Beitreten', about:'Über den Kanal', scroll:'nach unten scrollen',
    aboutTitle:'Über den Kanal',
    p1:'Quiet Light ist ein Raum für Menschen, die wissen, wie man entschleunigt. Hier findest du Fotografien, bei denen man gerne verweilt: gemütliche Ecken, stille Straßen, Morgenlicht durch Blätter, Tropfen auf Glas und Details, an denen die Welt sonst einfach vorbeigeht.',
    p2:'Street-Fotografie bedeutet hier nicht Menschenmassen, sondern die Momente dazwischen. Eine Person am Fenster, ein Schatten auf dem Asphalt, ein altes Schild in einer Gasse. Natur im Nahaufnahme: Rindenstrukturen, Blattadern, Raureif im Gras.',
    p3:'Dieser Kanal läuft ohne Algorithmen und ohne Jagd nach Reichweite. Nur das, was wirklich ins Auge fällt. Abonniere ihn — und fang an, Schönheit dort zu sehen, wo du früher einfach vorbeigegangen bist.',
  },
  fr: {
    sub:'Cosy. Rue. Nature. Macro.', join:'Rejoindre', about:'À propos', scroll:'défiler vers le bas',
    aboutTitle:'À propos de la chaîne',
    p1:"Quiet Light est un espace pour ceux qui savent ralentir. On y trouve des photographies qu'on aime contempler longuement : des coins chaleureux, des rues silencieuses, la lumière du matin à travers les feuilles, des gouttes sur le verre et des détails que le monde dépasse sans les voir.",
    p2:"La photographie de rue ici n'est pas une affaire de foule, mais de moments entre les moments. Une personne près d'une fenêtre, une ombre sur le bitume, une vieille enseigne dans une ruelle. La nature en gros plan : textures d'écorce, nervures de pétales, givre sur l'herbe.",
    p3:"Cette chaîne fonctionne sans algorithmes ni course aux vues. Seulement ce qui accroche vraiment le regard. Abonne-toi — et commence à remarquer la beauté là où tu passais autrefois sans t'arrêter.",
  },
  zh: {
    sub:'温馨。街拍。自然。微距。', join:'加入我们', about:'关于频道', scroll:'向下滑动',
    aboutTitle:'关于频道',
    p1:'Quiet Light 是一个为懂得放慢脚步的人而生的空间。这里汇聚了值得细细品味的照片：温馨的角落、静谧的街道、晨光透过树叶、玻璃上的水珠，以及那些被世界匆匆略过的细节。',
    p2:'这里的街头摄影不关乎人群与喧嚣，而是关于瞬息之间的片刻：窗边的人影、柏油路上的阴影、小巷里的旧招牌。大自然通过特写展现：树皮的纹理、花瓣的脉络、草叶上的霜。微距让平凡变得惊叹。',
    p3:'这个频道没有算法驱动，没有流量竞争。只有真正触动目光的画面。订阅吧——开始在你曾经擦肩而过的地方，发现美。',
  },
};

function applyLang(lang) {
  const t = T[lang];
  ['sub','join','about','scroll'].forEach(k => document.getElementById('txt-'+k).textContent = t[k]);
  document.getElementById('txt-about-title').textContent = t.aboutTitle;
  document.getElementById('txt-about-p1').textContent = t.p1;
  document.getElementById('txt-about-p2').textContent = t.p2;
  document.getElementById('txt-about-p3').textContent = t.p3;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-option').forEach(btn =>
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`)));
}
applyLang('ru');

function toggleLang() { document.getElementById('langDropdown').classList.toggle('open'); }
function setLang(lang) { applyLang(lang); document.getElementById('langDropdown').classList.remove('open'); }
function scrollToAbout() { document.getElementById('page-about').scrollIntoView({ behavior: 'smooth' }); }

document.addEventListener('click', e => {
  if (!e.target.closest('#langBtn') && !e.target.closest('#langDropdown'))
    document.getElementById('langDropdown').classList.remove('open');
});

new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) document.getElementById('aboutCard').classList.add('visible'); });
}, { threshold: 0.12 }).observe(document.getElementById('aboutCard'));
</script>
</body>
</html>
