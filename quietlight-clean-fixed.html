<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiet Light</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition:
      background 0.9s cubic-bezier(0.22, 1, 0.36, 1),
      color 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      scroll-behavior: smooth;
    }

    /* ── Theme transition overlay (Telegram-style circle expand) ── */
    #theme-overlay {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      overflow: hidden;
    }
    #theme-circle {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      width: 0; height: 0;
      transition: none;
    }

    /* ── Canvas ── */
    #rays-canvas {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      transition: opacity 0.5s ease;
    }

    /* ── Fixed buttons ── */
    .top-btn {
      position: fixed; top: 20px; z-index: 200;
      border: none; border-radius: 50%; width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 4px 16px rgba(0,0,0,0.3);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .top-btn:hover { background: rgba(255,255,255,0.2); }
    .top-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 1.5; transition: stroke 0.3s; }
    #langBtn { right: 20px; }
    #langBtn.open { transform: rotate(20deg) scale(1.08); background: rgba(255,255,255,0.2); }
    #themeBtn { right: 76px; }

    /* ── Lang dropdown ── */
    .lang-dropdown {
      position: fixed; top: 74px; right: 20px; z-index: 200;
      border-radius: 18px; overflow: hidden; flex-direction: column; min-width: 168px;
      transform-origin: top right;
      transform: scale(0.8) translateY(-10px); opacity: 0; pointer-events: none;
      display: flex;
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
      background: rgba(20,20,22,0.9);
      backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lang-dropdown.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
    .lang-option {
      padding: 13px 20px; cursor: pointer; font-size: 15px; font-weight: 500;
      color: #fff; display: flex; align-items: center; gap: 10px;
      border: none; background: none; text-align: left; width: 100%;
      transition: background 0.18s;
    }
    .lang-option:hover { background: rgba(255,255,255,0.09); }
    .lang-option.active { font-weight: 700; }
    .lang-option .flag { font-size: 18px; }

    /* ── Light theme ── */
    body.light { background: #f0ede8; color: #111; }
    body.light #rays-canvas { opacity: 0.15; filter: invert(1) hue-rotate(180deg); }
    body.light .top-btn {
      background: rgba(0,0,0,0.07); border-color: rgba(0,0,0,0.15);
      box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 4px 16px rgba(0,0,0,0.1);
    }
    body.light .top-btn svg { stroke: #222; }
    body.light #langBtn.open { background: rgba(0,0,0,0.12); }
    body.light .lang-dropdown { background: rgba(238,234,228,0.97); border-color: rgba(0,0,0,0.1); }
    body.light .lang-option { color: #111; }
    body.light .lang-option:hover { background: rgba(0,0,0,0.06); }
    body.light .hero-sub { color: rgba(0,0,0,0.4); }
    body.light .btn-join { background: rgba(0,0,0,0.88); color: #fff; box-shadow: 0 2px 0 rgba(255,255,255,0.1) inset, 0 8px 32px rgba(0,0,0,0.15); }
    body.light .btn-about { background: rgba(0,0,0,0.06); color: #111; border-color: rgba(0,0,0,0.2); }
    body.light .scroll-hint svg { stroke: rgba(0,0,0,0.3); }
    body.light .scroll-hint span { color: rgba(0,0,0,0.3); }
    body.light .about-card { background: rgba(255,255,255,0.75); border-color: rgba(0,0,0,0.08); }
    body.light .about-title, body.light .about-text { color: #111; }
    body.light #page-footer {
      border-top-color: rgba(0,0,0,0.08);
      background: #0d0d11;
    }
    body.light .footer-copy { color: rgba(0,0,0,0.25); }
    body.light .btn-contact { background: rgba(0,0,0,0.06); color: #111; border-color: rgba(0,0,0,0.15); }
    body.light .btn-contact:hover { background: rgba(0,0,0,0.1); }
    body.light .btn-donate { background: rgba(0,0,0,0.88); color: #fff; }

    
    body.light::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.95), transparent 30%),
        radial-gradient(circle at 80% 60%, rgba(220,220,255,0.45), transparent 35%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,0.7), transparent 30%);
      filter: blur(90px);
      opacity: 0.85;
      animation: lightFlow 14s ease-in-out infinite alternate;
    }

    @keyframes lightFlow {
      from {
        transform: translateY(0px) scale(1);
      }
      to {
        transform: translateY(-20px) scale(1.05);
      }
    }


    /* ── Hero ── */
    #page-hero {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      padding: 40px 28px 80px; gap: 16px;
    }
    .hero-title {
      font-size: clamp(52px, 15vw, 76px); font-weight: 800;
      letter-spacing: -0.02em; line-height: 1;
      opacity: 0; transform: translateY(28px);
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) forwards;
      text-shadow:
        0 0 40px rgba(255,255,255,0.08),
        0 0 80px rgba(255,255,255,0.03);
    }
    .hero-sub {
      font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* ── Liquid glass buttons ── */
    .btn-join {
      width: 100%; max-width: 320px; padding: 18px 0;
      font-size: 18px; font-weight: 700; border: none; border-radius: 20px;
      cursor: pointer; text-decoration: none; display: block; text-align: center;
      margin-top: 10px; color: #000;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 2px 0 rgba(255,255,255,0.9) inset, 0 -1px 0 rgba(0,0,0,0.08) inset,
                  0 8px 32px rgba(255,255,255,0.12), 0 1px 2px rgba(0,0,0,0.3);
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative; overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease, background 0.3s, color 0.3s;
    }
    .btn-join::before {
      content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-20deg); transition: left 0.6s ease; pointer-events: none;
    }
    .btn-join:hover::before { left: 130%; }
    .btn-join:hover {
      transform: scale(1.035) translateY(-2px);
      box-shadow:
        0 20px 60px rgba(255,255,255,0.24),
        0 4px 18px rgba(255,255,255,0.15);
    }
    .btn-join:active { transform: scale(0.97) translateY(1px); transition: transform 0.1s; }

    .btn-about {
      width: 100%; max-width: 320px; padding: 17px 0;
      font-size: 18px; font-weight: 700; border-radius: 20px;
      cursor: pointer; text-align: center; color: #fff;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s 0.52s cubic-bezier(0.22,1,0.36,1) forwards;
      position: relative; overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.3s, border-color 0.3s, color 0.3s;
    }
    .btn-about::before {
      content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
      transform: skewX(-20deg); transition: left 0.6s ease; pointer-events: none;
    }
    .btn-about:hover::before { left: 130%; }
    .btn-about:hover {
      transform: scale(1.03) translateY(-2px);
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.35);
      backdrop-filter: blur(30px) saturate(180%);
    }
    .btn-about:active { transform: scale(0.97) translateY(1px); transition: transform 0.1s; }

    .scroll-hint {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      opacity: 0; animation: fadeIn 1s 1.2s ease forwards;
    }
    .scroll-hint span { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.4; }
    .scroll-hint svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.4); fill: none; stroke-width: 2; animation: arrowBounce 2s 1.8s ease infinite; }
    @keyframes arrowBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }

    /* ── About ── */
    #page-about { position: relative; z-index: 1; padding: 60px 24px 60px; }
    .about-card {
      border-radius: 26px; padding: 40px 28px; max-width: 520px; margin: 0 auto;
      background: rgba(18,18,20,0.65);
      backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 32px 80px rgba(0,0,0,0.5);
      opacity: 0; transform: translateY(50px) scale(0.98);
      transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1),
                  background 0.5s, border-color 0.5s;
    }
    .about-card.visible { opacity: 1; transform: translateY(0) scale(1); }
    .about-title { font-size: clamp(32px, 9vw, 46px); font-weight: 800; margin-bottom: 24px; text-align: center; transition: color 0.3s; }
    .about-text { font-size: clamp(15px, 4.2vw, 18px); font-weight: 700; line-height: 1.65; text-align: center; transition: color 0.3s; }
    .about-text + .about-text { margin-top: 18px; }

    /* ── Footer ── */
    #page-footer {
      position: relative; z-index: 1;
      padding: 40px 24px 48px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* Contact button — link to @aessqqwx */
    .btn-contact {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 10px 18px; border-radius: 16px; text-decoration: none;
      font-size: 15px; font-weight: 600; color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(16px);
      transition: background 0.25s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.3s, border-color 0.3s;
    }
    .btn-contact:hover { background: rgba(255,255,255,0.15); transform: scale(1.03); }
    .btn-contact:active { transform: scale(0.97); }
    .btn-contact svg { width: 18px; height: 18px; fill: #2AABEE; flex-shrink: 0; }
    .btn-contact span {
      line-height: 1.25;
    }

    /* Donate button — opens donate page */
    .btn-donate {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 11px 22px; border-radius: 14px; text-decoration: none;
      font-size: 15px; font-weight: 700; color: #000;
      background: rgba(255,255,255,0.92);
      border: none; cursor: pointer;
      backdrop-filter: blur(16px);
      box-shadow: 0 2px 0 rgba(255,255,255,0.8) inset, 0 8px 24px rgba(255,255,255,0.1);
      transition: background 0.25s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.3s;
      position: relative; overflow: hidden;
    }
    .btn-donate::before {
      content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-20deg); transition: left 0.55s ease; pointer-events: none;
    }
    .btn-donate:hover::before { left: 130%; }
    .btn-donate:hover { transform: scale(1.03); }
    .btn-donate:active { transform: scale(0.97); }

    .footer-copy {
      font-size: 10px; font-weight: 400;
      color: rgba(255,255,255,0.2);
      text-align: center; line-height: 1.8;
      letter-spacing: 0.03em;
      margin-top: 6px;
      transition: color 0.3s;
    }

    /* ── Donate page (hidden by default) ── */
    #page-donate {
      display: none;
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeIn 0.3s ease;
    }
    #page-donate.open { display: flex; }
    .donate-card {
      background: rgba(22,22,26,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px; padding: 36px 28px;
      max-width: 380px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 40px 100px rgba(0,0,0,0.7);
      animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    body.light .donate-card { background: rgba(245,242,238,0.98); border-color: rgba(0,0,0,0.08); }
    body.light .donate-card .donate-title,
    body.light .donate-card .donate-sub { color: #111; }
    body.light .donate-card .donate-phone { color: #111; }
    body.light .donate-close { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12); color: #111; }

    @keyframes scaleIn { from { opacity:0; transform: scale(0.85) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }

    .donate-title { font-size: 22px; font-weight: 800; text-align: center; }
    .donate-sub { font-size: 13px; color: rgba(255,255,255,0.45); text-align: center; }
    body.light .donate-sub { color: rgba(0,0,0,0.4); }

    /* Sber logo — accurate recreation */
    .sber-icon { width: 64px; height: 64px; }

    .donate-phone {
      font-size: 22px; font-weight: 800; letter-spacing: 0.04em; text-align: center;
    }
    .donate-bank-label {
      font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; margin-top: -10px;
    }
    body.light .donate-bank-label { color: rgba(0,0,0,0.3); }

    .donate-close {
      width: 100%; padding: 14px 0; border-radius: 14px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; color: #fff;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.14);
      transition: background 0.2s, transform 0.2s;
    }
    .donate-close:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<!-- Theme transition overlay -->
<div id="theme-overlay"><div id="theme-circle"></div></div>

<canvas id="rays-canvas"></canvas>

<!-- Theme & Lang buttons -->

<script>
/* ════════ RAYS CANVAS ════════ */
const canvas = document.getElementById('rays-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
const offscreen = document.createElement('canvas');
const off = offscreen.getContext('2d');

function makeBlob() {
  const tier = Math.random();
  let radiusX, radiusY, baseAlpha, speed, blurR;
  if (tier < 0.3) {
    radiusX=18+Math.random()*28; radiusY=H*(0.18+Math.random()*0.18);
    baseAlpha=0.55+Math.random()*0.35; speed=0.5+Math.random()*0.8; blurR=18+Math.random()*22;
  } else if (tier < 0.65) {
    radiusX=55+Math.random()*75; radiusY=H*(0.22+Math.random()*0.22);
    baseAlpha=0.35+Math.random()*0.3; speed=0.25+Math.random()*0.45; blurR=35+Math.random()*40;
  } else {
    radiusX=130+Math.random()*160; radiusY=H*(0.28+Math.random()*0.28);
    baseAlpha=0.18+Math.random()*0.18; speed=0.12+Math.random()*0.22; blurR=60+Math.random()*70;
  }
  return {
    x:W*(0.08+Math.random()*0.84), y:H+radiusY, radiusX, radiusY, baseAlpha, speed, blurR,
    sway:Math.random()*Math.PI*2, swaySpeed:0.004+Math.random()*0.008, swayAmp:20+Math.random()*55,
    life:0, maxLife:300+Math.random()*500, fadeIn:90+Math.random()*80, fadeOut:90+Math.random()*100,
  };
}

let blobs = Array.from({length:20}, ()=>{
  const b=makeBlob(); b.life=Math.random()*b.maxLife;
  b.y=H+b.radiusY-(b.life/b.maxLife)*(H+b.radiusY*2.5); return b;
});

let ambT=0;
function drawFrame() {
  ctx.clearRect(0,0,W,H);
  ambT+=0.005;
  const pulse=0.5+Math.sin(ambT)*0.5;
  const ag=ctx.createRadialGradient(W/2,H,0,W/2,H*0.45,H*1.15);
  ag.addColorStop(0,`rgba(110,110,130,${0.28+pulse*0.1})`);
  ag.addColorStop(0.4,`rgba(60,60,75,${0.14+pulse*0.05})`);
  ag.addColorStop(0.75,`rgba(20,20,28,0.07)`);
  ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag; ctx.fillRect(0,0,W,H);

  blobs.forEach((b,i)=>{
    b.life+=1; b.y-=b.speed; b.sway+=b.swaySpeed;
    const sx=b.x+Math.sin(b.sway)*b.swayAmp;
    let lf=1;
    if(b.life<b.fadeIn) lf=easeInOut(b.life/b.fadeIn);
    else if(b.life>b.maxLife-b.fadeOut) lf=easeInOut((b.maxLife-b.life)/b.fadeOut);
    if(b.life>=b.maxLife){blobs[i]=makeBlob();return;}
    const alpha=b.baseAlpha*lf;
    const pad=b.blurR*2.5, ow=(b.radiusX+pad)*2, oh=(b.radiusY+pad)*2;
    offscreen.width=ow; offscreen.height=oh; off.clearRect(0,0,ow,oh);
    const cx=ow/2, cy=oh/2;
    const grd=off.createRadialGradient(cx,cy,0,cx,cy,Math.max(b.radiusX,b.radiusY));
    grd.addColorStop(0,`rgba(255,255,255,${alpha})`);
    grd.addColorStop(0.25,`rgba(220,225,255,${alpha*0.7})`);
    grd.addColorStop(0.55,`rgba(180,185,230,${alpha*0.35})`);
    grd.addColorStop(0.85,`rgba(140,140,200,${alpha*0.1})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    off.save(); off.filter=`blur(${b.blurR}px)`;
    off.scale(1,b.radiusY/b.radiusX);
    off.beginPath(); off.arc(cx,cy*(b.radiusX/b.radiusY),b.radiusX,0,Math.PI*2);
    off.fillStyle=grd; off.fill(); off.restore();
    ctx.drawImage(offscreen,sx-ow/2,b.y-oh/2);
  });
  requestAnimationFrame(drawFrame);
}
drawFrame();

/* ════════ PREMIUM THEME SWITCH ════════ */
let isLight = false;
let themeAnimating = false;

function toggleTheme(e) {
  if (themeAnimating) return;
  themeAnimating = true;

  const btn = document.getElementById('themeBtn');
  const rect = btn.getBoundingClientRect();

  const originX = rect.left + rect.width / 2;
  const originY = rect.top + rect.height / 2;

  const maxRadius = Math.hypot(
    Math.max(originX, window.innerWidth - originX),
    Math.max(originY, window.innerHeight - originY)
  );

  const circle = document.getElementById('theme-circle');

  circle.style.width = `${maxRadius * 2}px`;
  circle.style.height = `${maxRadius * 2}px`;
  circle.style.left = `${originX - maxRadius}px`;
  circle.style.top = `${originY - maxRadius}px`;
  circle.style.background = isLight ? '#080808' : '#f0ede8';

  circle.style.transition = 'none';
  circle.style.transform = 'scale(0.001)';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      circle.style.transition = 'transform 700ms cubic-bezier(0.22, 1, 0.36, 1)';
      circle.style.transform = 'scale(1)';
    });
  });

  setTimeout(() => {
    isLight = !isLight;

    document.body.classList.toggle('light', isLight);

    const icon = document.getElementById('themeIcon');

    if (isLight) {
      icon.innerHTML = `
        <path d="M21 12.79A9 9 0 1 1 11.21 3
        7 7 0 0 0 21 12.79z"/>
      `;
    } else {
      icon.innerHTML = `
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42
        M18.36 18.36l1.42 1.42M1 12h2M21 12h2
        M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      `;
    }

    localStorage.setItem('quietlight-theme', isLight ? 'light' : 'dark');

    setTimeout(() => {
      circle.style.transition = 'opacity 250ms ease';
      circle.style.opacity = '0';

      setTimeout(() => {
        circle.style.opacity = '1';
        circle.style.transform = 'scale(0.001)';
        circle.style.transition = 'none';
        themeAnimating = false;
      }, 250);
    }, 420);
  }, 350);
}

  document.getElementById('txt-donate-sub').textContent = t.donateSub;

}
